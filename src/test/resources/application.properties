# Test-specific configuration
# Disable SQL script initialization during tests to avoid conflicts with @DataJpaTest
# Tests will use entity definitions instead of pre-populated data

spring.sql.init.mode=never

# Use separate test database
# Creates an isolated in-memory database for tests (different from main app's 'cookiegramdb')

spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver

# Create fresh schema for each test, then drop it after
# 'create-drop' ensures tests start with clean tables and no leftover data

spring.jpa.hibernate.ddl-auto=create-drop