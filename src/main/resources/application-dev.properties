spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# MySQL Database (host port mapping)
spring.datasource.url=jdbc:mysql://localhost:3307/cookiegram
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cookieuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cookiepass}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Data initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:database/data/*.sql
spring.jpa.defer-datasource-initialization=true

# Dev bootstrap users enabled
app.bootstrap.users.enabled=true
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:dev-admin@local.test}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:dev-admin-password}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:dev-employee@local.test}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:dev-employee-password}

# ========================================
# DEVELOPMENT LOGGING CONFIGURATION
# ========================================
# Root level - still keep it relatively quiet
logging.level.root=INFO

# Spring Framework - only show important stuff
logging.level.org.springframework.web=DEBUG
logging.level.org.springframework.security=DEBUG
logging.level.org.springframework.boot.autoconfigure=INFO

# Database & Hibernate - useful for debugging queries
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE
logging.level.org.hibernate.orm.jdbc.bind=TRACE

# Your application - maximum visibility
logging.level.com.cookiegramstudios.cookiegram=DEBUG

# Request/Response logging
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=TRACE
spring.mvc.log-request-details=true

# Enhanced console output for development
logging.pattern.console=%clr(%d{yyyy-MM-dd HH:mm:ss.SSS}){faint} %clr(%5p) %clr(---){faint} %clr([%15.15t]){faint} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx

# Optional: Log to file for detailed analysis
logging.file.name=logs/cookiegram-dev.log
logging.file.max-size=10MB
logging.file.max-history=7
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n