spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# MySQL Database (host port mapping)
spring.datasource.url=jdbc:mysql://localhost:3307/cookiegram
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cookieuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cookiepass}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Data initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:database/data/*.sql
spring.jpa.defer-datasource-initialization=true

# Dev bootstrap users enabled
app.bootstrap.users.enabled=true
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:dev-admin@local.test}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:dev-admin-password}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:dev-employee@local.test}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:dev-employee-password}

# ========================================
# DEVELOPMENT LOGGING - CLEAN & FOCUSED
# ========================================

# Root level - quiet
logging.level.root=INFO

# ===== FILTER OUT THE NOISE =====
# Stop logging every static resource request (CSS, JS, images, favicon)
logging.level.org.springframework.web.servlet.resource=WARN
logging.level.org.springframework.web.servlet.handler.SimpleUrlHandlerMapping=WARN

# Reduce security context spam (it logs the SAME auth info on EVERY request)
logging.level.org.springframework.security.web.context.HttpSessionSecurityContextRepository=WARN

# Stop "Securing" and "Secured" duplicate messages
logging.level.org.springframework.security.web.FilterChainProxy=INFO

# Quiet down view resolver
logging.level.org.springframework.web.servlet.view.ContentNegotiatingViewResolver=WARN

# Quiet down method parameter resolution spam
logging.level.org.springframework.web.method.HandlerMethod=INFO

# ===== KEEP USEFUL SECURITY INFO =====
# Show authentication attempts and authorization decisions
logging.level.org.springframework.security=INFO
logging.level.org.springframework.security.authentication=DEBUG
logging.level.org.springframework.security.access=DEBUG

# ===== SHOW YOUR ACTUAL PAGE REQUESTS =====
# This shows the main page requests, not static resources
logging.level.org.springframework.web.servlet.DispatcherServlet=DEBUG
logging.level.org.springframework.web.servlet.mvc.method.annotation.RequestMappingHandlerMapping=DEBUG

# ===== DATABASE QUERIES =====
# Show SQL with parameters (no duplicates)
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.orm.jdbc.bind=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# ===== YOUR APPLICATION CODE =====
logging.level.com.cookiegramstudios.cookiegram=DEBUG

# ===== REQUEST/RESPONSE DETAILS =====
spring.mvc.log-request-details=true

# ===== CLEANER CONSOLE FORMAT =====
# Simpler, more readable output with colors
logging.pattern.console=%clr(%d{HH:mm:ss.SSS}){faint} %clr(%5p) %clr(%-40.40logger{39}){cyan} : %m%n

# ===== FILE LOGGING FOR DEEP DEBUGGING =====
# Keep everything in a file, but clean console
logging.file.name=logs/cookiegram-dev.log
logging.file.max-size=10MB
logging.file.max-history=3
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n