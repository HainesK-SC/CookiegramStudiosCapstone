# Development profile convenience bootstrap
spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# Data source for MySQL Docker container
# Since we have moved from H2, DB must be spun up in Docker
# App can be developed and run locally to test
# New Docker image of the app can be made with Docker Compose
spring.datasource.url=jdbc:mysql://localhost:3307/cookiegram
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cookieuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cookiepass}

# JPA/Hibernate (dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run data initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:database/data/*.sql
spring.jpa.defer-datasource-initialization=true

# Enabled only when SPRING_PROFILES_ACTIVE=dev
app.bootstrap.users.enabled=true

# Safe local defaults (override via environment variables as needed)
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:dev-admin@local.test}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:dev-admin-password}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:dev-employee@local.test}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:dev-employee-password}