<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
	th:replace="~{layout/public-layout :: layout(~{::content})}">
<head>
<meta charset="UTF-8">
<title>CookieGram | Checkout</title>
</head>
<body>
	<section th:fragment="content" class="checkout-section">
		<h1>Checkout - Order Information</h1>

		<!-- Error messages -->
		<div th:if="${error}" class="alert alert-error">
			<p th:text="${error}"></p>
		</div>

		<div class=checkout-container">
			<!-- Order Summary (read-only) -->
			<div class="order-summary-box">
                <h2>Order Summary</h2>
                <table class="order-summary-table">
                    <thead>
                        <tr>
                            <th>Product</th>
                            <th>Quantity</th>
                            <th>Price</th>
                            <th>Subtotal</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr th:each="item : ${cartItems}">
                            <td th:text="${item.productType.baseName}">Cookie Name</td>
                            <td th:text="${item.itemQty}">1</td>
                            <td th:text="'$' + ${item.productType.basePrice}">$10.00</td>
                            <td th:text="'$' + ${#numbers.formatDecimal(item.productType.basePrice * item.itemQty, 1, 2)}">$10.00</td>
                        </tr>
                    </tbody>
                    <tfoot>
                        <tr>
                            <td colspan="3" class="text-right"><strong>Subtotal:</strong></td>
                            <td th:text="'$' + ${subtotal}">$10.00</td>
                        </tr>
                        <tr>
                            <td colspan="3" class="text-right"><strong>Tax (13%):</strong></td>
                            <td th:text="'$' + ${tax}">$1.30</td>
                        </tr>
                        <tr class="total-row">
                            <td colspan="3" class="text-right"><strong>Total:</strong></td>
                            <td><strong th:text="'$' + ${total}">$11.30</strong></td>
                        </tr>
                    </tfoot>
                </table>
            </div>

			<!-- Checkout Form -->
			<form th:action="@{/order/checkout}" method="POST" th:object="${checkoutForm}" class="checkout-form">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                
				<!-- 1. Custom Messages -->
	
				<!-- 2. Recipient Information -->
	
				<!-- 3. Delivery Details  -->
	
				<!-- 4. Sender Information -->

			<!-- Action Buttons - back to cart, proceed to payment -->
 			</form>
		</div>




	</section>

	<script>
	
	</script>
</body>
</html>
