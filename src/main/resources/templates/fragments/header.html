<header th:fragment="header" class="site-header">
    <div class="site-header-inner">

        <div class="site-header-brand">
            <a th:href="@{/}" class="text-decoration-none">
                <h4 class="mb-0">CookieGram</h4>
            </a>
        </div>

        <nav class="site-header-nav" aria-label="Quick links">
            <a th:href="@{/about}" class="site-header-link">About</a>
            <a th:href="@{/faq}" class="site-header-link">FAQ</a>
            <a th:href="@{/contact}" class="site-header-link">Contact</a>
            <!-- This will only display the Order link if the URI starts with /order -->
            <a th:if="${!#request.requestURI.startsWith('/order')}" th:href="@{/order}" ...>Order</a>
        </nav>

        <div class="site-header-auth">
            <div th:if="${currentUser != null}" class="text-muted small d-flex align-items-center gap-2">
                <span>Signed in as:</span>
                <strong th:text="${currentUser.lastName}">Last</strong>
                <span class="text-secondary">|</span>
                <span class="badge text-bg-light border" th:text="${currentUser.role}">ROLE</span>
            </div>

            <form th:if="${currentUser != null}" th:action="@{/logout}" method="post" class="m-0">
                <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                <button type="submit" class="btn btn-outline-secondary btn-sm">Logout</button>
            </form>

            <div th:if="${currentUser == null}">
                <span class="me-2 text-muted small login-tag">Staff Login</span>
                <a th:href="@{/login}" class="login-button">
                    Login
                </a>
            </div>
        </div>

    </div>
</header>
