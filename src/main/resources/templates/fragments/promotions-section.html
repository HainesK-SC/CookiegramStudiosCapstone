<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
	<head>
		<meta charset="UTF-8">
		<title></title>
		<link rel="stylesheet" th:href="@{/css/public.css}">
		<link rel="stylesheet" th:href="@{/css/promotion-section-styling.css}">
	</head>
	<body>
		
		<!-- NO BOOTSTRAP -->
		<section th:fragment="activePromotions(promotions)" class="promotion-section">
			<div class="promo-container">
			  <h2 class="promo-header">Current Promotions</h2>
			
			  <div class="promo-panel">
			    <ul class="promo-list">
			      <li th:each="promo : ${promotions}" class="promo-card">
			        <img th:src="@{/images/promotions/promotion_placeholder_image.jpg}"
			             alt="Promotion Image"
			             class="promo-image">
			
			        <div class="promo-code" th:text="${promo.promoCode}">PROMO</div>
			
			        <p class="promo-desc" th:text="${promo.description}">Promo description</p>
			
			        <p class="promo-value" th:if="${promo.promoType == T(com.cookiegramstudios.cookiegram.promotion.PromotionTypes).FIXED}"
			           th:text="${'Promo Value: $' + #numbers.formatDecimal(promo.promoValue, 0, 2)}"> {}
			          Promo Value:
			        </p>
			
			        <p class="promo-value" th:if="${promo.promoType == T(com.cookiegramstudios.cookiegram.promotion.PromotionTypes).PERCENTAGE}"
			           th:text="${'Promo Value: ' + #numbers.formatDecimal(promo.promoValue, 0, 0) + '%'}">
			          Promo Value:
			        </p>
			      </li>
			    </ul>
			  </div>
			</div>
		</section>
	</body>
</html>
