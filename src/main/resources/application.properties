spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# MySQL Database (Docker network)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/cookiegram}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cookieuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cookiepass}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Data initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:database/data/*.sql
spring.jpa.defer-datasource-initialization=true

# Dev-only bootstrap users
app.bootstrap.users.enabled=${APP_BOOTSTRAP_USERS_ENABLED:false}
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:}