spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# H2 Database (in-memory)
spring.datasource.url=jdbc:h2:mem:cookiegramdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# JPA/Hibernate (dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
# Run data initialization
spring.sql.init.mode=always
spring.sql.init.data-locations=classpath:database/data/*.sql
# IMPORTANT: make sure data runs AFTER Hibernate creates tables
spring.jpa.defer-datasource-initialization=true

# dev-only bootstrap users (from environment variables)
# Keep disabled by default so no credentials are required in CI.
app.bootstrap.users.enabled=${APP_BOOTSTRAP_USERS_ENABLED:false}
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:}
