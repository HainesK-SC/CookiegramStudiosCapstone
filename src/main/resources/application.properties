spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# MySQL Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/cookiegram-mysql}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:root}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:password}


# JPA/Hibernate (dev)
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Run data initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:database/data/*.sql
spring.jpa.defer-datasource-initialization=true

# dev-only bootstrap users (from environment variables)
# Keep disabled by default so no credentials are required in CI.
app.bootstrap.users.enabled=${APP_BOOTSTRAP_USERS_ENABLED:false}
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:}
