spring.application.name=CookieGramStudiosProject
server.port=8080
server.address=0.0.0.0

# MySQL Database (Docker network)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://mysql:3306/cookiegram}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:cookieuser}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:cookiepass}

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# Data initialization
spring.sql.init.mode=never
spring.sql.init.data-locations=classpath:database/data/*.sql
spring.jpa.defer-datasource-initialization=true

# Dev-only bootstrap users
app.bootstrap.users.enabled=${APP_BOOTSTRAP_USERS_ENABLED:false}
app.bootstrap.users.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.users.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.users.employee.email=${BOOTSTRAP_EMPLOYEE_EMAIL:}
app.bootstrap.users.employee.password=${BOOTSTRAP_EMPLOYEE_PASSWORD:}

# ========================================
# LOGGING CONFIGURATION (Production)
# ========================================
# Default log level - keeps logs minimal
logging.level.root=WARN
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN

# Your application logs only
logging.level.com.cookiegramstudios.cookiegram=INFO

# Log pattern for better readability
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss} - %msg%n




# Payment Configuration

# Tax rates by province (as decimals: 0.13 = 13%)
payment.tax-rates.ON=0.13
payment.tax-rates.BC=0.12
payment.tax-rates.AB=0.05
payment.tax-rates.QC=0.14975
payment.tax-rates.NS=0.15
payment.tax-rates.NB=0.15
payment.tax-rates.MB=0.12
payment.tax-rates.SK=0.11
payment.tax-rates.PE=0.15
payment.tax-rates.NL=0.15
payment.tax-rates.NT=0.05
payment.tax-rates.YT=0.05
payment.tax-rates.NU=0.05
 
# Default settings
payment.default-tax-rate=0.13
payment.default-province=ON
payment.currency=CAD
 
# Order number generation settings
payment.order-number-settings.prefix=CG
payment.order-number-settings.start-range=1000
payment.order-number-settings.end-range=9999
payment.order-number-settings.use-sequential=true
 
# Pricing settings
payment.pricing.minimum-order-amount=0.0
payment.pricing.delivery-fee=0.0