# Basic setup for a CI file for PRs into main
# Expected to change over time
name: Build and Test

# Define permissions for the GitHub token used by this workflow
permissions:
  contents: read           # Allows reading repository contents
  pull-requests: write     # Allows posting comments on PRs with test results
  checks: write            # Allows creating check runs for test reporting

# Trigger this workflow on pull requests targeting the main branch
on:
  pull_request:
    branches: [ main ]

jobs:
  build:
    # Run this job on the latest Ubuntu runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Check out the repository code
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Fetch all history for all branches and tags (useful for accurate git operations)
          fetch-depth: 0

      # Step 2: Set up Java Development Kit
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'  # Use Eclipse Temurin (formerly AdoptOpenJDK)
          java-version: '21'       # Java version required by the project
          cache: 'maven'           # Cache Maven dependencies to speed up builds

      # Step 3: Compile the code and run all tests
      - name: Build and run tests
        run: mvn clean verify  # Runs unit tests (surefire) and integration tests (failsafe)

      # Step 4: Publish test results as a PR comment and check run
      # This creates a nice summary visible in the PR and Checks tab
      - name: Publish Test Results
        uses: EnricoMi/publish-unit-test-result-action@v2
        if: always()  # Run even if previous steps fail
        with:
          # Look for XML test reports generated by Maven Surefire and Failsafe plugins
          files: |
            **/target/surefire-reports/*.xml
            **/target/failsafe-reports/*.xml
          check_name: Test Results      # Name shown in the Checks tab
          comment_title: Test Results   # Title of the PR comment

      # Step 5: Upload raw XML test results as artifacts
      # These can be downloaded for further analysis or debugging
      - name: Upload test results
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: test-results  # Name of the artifact
          path: |
            **/target/surefire-reports/*.xml   # Unit test results
            **/target/failsafe-reports/*.xml   # Integration test results
          retention-days: 7  # Keep artifacts for 7 days

      # Step 6: Generate human-readable HTML reports from test results
      # These provide detailed, formatted views of test execution
      - name: Generate HTML Test Report
        if: always()  # Generate even if tests fail
        run: mvn surefire-report:report-only failsafe-report:report-only

      # Step 7: Upload HTML test reports as artifacts
      # Download these to view nicely formatted test results in your browser
      - name: Upload HTML Test Report
        if: always()  # Upload even if report generation fails
        uses: actions/upload-artifact@v4
        with:
          name: html-test-report
          path: |
            **/target/site/surefire-report.html   # Unit test HTML report
            **/target/site/failsafe-report.html   # Integration test HTML report
          retention-days: 30  # Keep HTML reports for 30 days (longer than XML)