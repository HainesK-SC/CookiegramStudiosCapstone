# Authored by Matthew Samaha - Date: 2026-02-24
# Version 1.0
name: Secret Scan

# Explicit permissions following least-privilege principle
# contents: read → allows the workflow to read repository contents
# pull-requests: read → required for scanning PR diffs
permissions:
  contents: read
  pull-requests: read

# Define when this workflow should run
on:
  # Run when code is pushed to these branches
  push:
    branches:
      - development
      - staging
      - main

  # Also run when a pull request targets these branches
  pull_request:
    branches:
      - development
      - staging
      - main

jobs:
  # Job identifier (can be any name)
  gitleaks:
    # Use a GitHub-hosted Linux runner
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout the repository so the runner can access the code
      # fetch-depth: 0 is required so Gitleaks can access full commit history
      # This prevents "ambiguous argument commit^..commit" errors during PR scans
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # Step 2: Run Gitleaks to scan for hardcoded secrets
      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          # Automatically generated token provided by GitHub
          # Required for scanning pull requests
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}